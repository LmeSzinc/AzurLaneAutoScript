<div style="display:grid; margin:.125rem 0;">
  <span style="font-size:1rem; font-weight:500; margin:0 .25rem;">设备ID (Device ID)</span>
  <input type="text" value="{device_id}" readonly
         style="font-family:monospace; font-size:0.9rem; padding:0.25rem 0.5rem; margin-top:0.25rem; border:1px solid #ccc; border-radius:4px; background:transparent; cursor:pointer; width:100%;"
         onclick="this.select(); document.execCommand('copy'); this.style.borderColor='#28a745'; setTimeout(()=>this.style.borderColor='#ccc', 1000);"
         title="点击复制">
</div>
